---
- name: Mettre a jour le cache apt
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Installer les dependances necessaires
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Creer le dossier des cles apt
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Ajouter la cle GPG officielle de Docker
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Ajouter le depot officiel Docker
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Installer Docker et Docker Compose
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Demarrer et activer Docker
  service:
    name: docker
    state: started
    enabled: true

- name: Ajouter ubuntu au groupe docker
  user:
    name: ubuntu
    groups: docker
    append: true